<!DOCTYPE html>
<html>
<head>
  <title>Attendance</title>
    <style>
        body {
        font-family: Arial;
        padding: 20px;
        }
        button {
        margin-top: 10px;
        padding: 8px 15px;
        }
    </style>
</head>
<body>

<h2>Attendance</h2>

<input type="date" id="date">

<div id="students"></div>

<button onclick="markAttendance()">Submit</button>
<button onclick="getReport()">Report</button>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>

let students = [];

const container = document.getElementById("students");

// 🔹 Load students from backend
async function loadStudents() {
  try {
    const res = await axios.get('http://localhost:3000/students');
    students = res.data;
    renderStudents();
  } catch (err) {
    console.log(err);
  }
}

// 🔹 Render radio buttons properly
function renderStudents() {

  container.innerHTML = "";

  students.forEach(s => {
    container.innerHTML += `
      <div style="margin:10px 0;">
        <strong>${s.name}</strong>
        
        <label>
          <input type="radio" name="student-${s.id}" value="present"> Present
        </label>
        
        <label>
          <input type="radio" name="student-${s.id}" value="absent"> Absent
        </label>
      </div>
    `;
  });
}

// 🔹 Mark attendance
function markAttendance() {

  const date = document.getElementById("date").value;

  if (!date) {
    alert("Please select a date ❗");
    return;
  }

  let records = [];

  students.forEach(s => {

    const selected = document.querySelector(
      `input[name="student-${s.id}"]:checked`
    );

    if (!selected) {
      alert(`Please mark attendance for ${s.name}`);
      return;
    }

    records.push({
      studentId: s.id,
      status: selected.value
    });
  });

  // 🔥 Send to backend
  axios.post('http://localhost:3000/attendance/mark', {
    date,
    records
  })
  .then(() => {
    alert("✅ Attendance Saved Successfully");
  })
  .catch(err => console.log(err));
}

// 🔹 Load on page start
loadStudents();

</script>

</body>
</html>
