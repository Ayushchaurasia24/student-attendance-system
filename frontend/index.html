async function getReport() {
  const reportRes = await axios.get('http://localhost:3000/attendance/report');
  const studentRes = await axios.get('http://localhost:3000/students');

  const reportData = reportRes.data;
  const studentsData = studentRes.data;

  const reportDiv = document.getElementById("report");
  reportDiv.innerHTML = "";

  if (reportData.length === 0) {
    reportDiv.innerHTML = "<p>No data</p>";
    return;
  }

  let table = `
    <table>
      <tr>
        <th>Name</th>
        <th>Total</th>
        <th>Present</th>
        <th>Percentage</th>
      </tr>
  `;

  reportData.forEach(r => {
    const student = studentsData.find(s => s.id === r.studentId);
    table += `
      <tr>
        <td>${student ? student.name : "Unknown"}</td>
        <td>${r.total}</td>
        <td>${r.present}</td>
        <td>${r.percentage}%</td>
      </tr>
    `;
  });

  table += `</table>`;
  reportDiv.innerHTML = table;
}
